<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 合同审查系统</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family: 'Microsoft YaHei', -apple-system, sans-serif; }
    .bg-gradient { background: linear-gradient(135deg, #f0f5ff 0%, #e6f7ff 50%, #f6ffed 100%); }
  </style>
</head>
<body class="bg-gradient min-h-screen flex">
  <!-- Left: Product Landing -->
  <div class="flex-1 flex items-center justify-center p-12">
    <div class="max-w-lg">
      <div class="w-14 h-14 rounded-xl flex items-center justify-center text-white text-2xl mb-6 shadow-lg" style="background:linear-gradient(135deg,#1677ff,#4096ff);">
        <i class="fa-solid fa-file-signature"></i>
      </div>
      <h1 class="text-3xl font-bold text-gray-900">合同审查系统</h1>
      <p class="text-base text-gray-500 mt-2 mb-10 leading-relaxed">
        AI 驱动的智能合同审查平台，帮助企业快速识别合同风险、规范合同管理流程。
      </p>

      <div class="grid grid-cols-2 gap-4">
        <div class="bg-white/80 rounded-lg border border-gray-100 p-4">
          <div class="flex gap-3">
            <div class="w-9 h-9 rounded-lg flex items-center justify-center shrink-0" style="background:#1677ff15;color:#1677ff"><i class="fa-solid fa-shield-halved"></i></div>
            <div><p class="text-sm font-semibold text-gray-800">AI 智能审查</p><p class="text-xs text-gray-500 mt-0.5">基于大模型的合同条款智能分析与风险识别</p></div>
          </div>
        </div>
        <div class="bg-white/80 rounded-lg border border-gray-100 p-4">
          <div class="flex gap-3">
            <div class="w-9 h-9 rounded-lg flex items-center justify-center shrink-0" style="background:#1677ff15;color:#1677ff"><i class="fa-solid fa-bolt"></i></div>
            <div><p class="text-sm font-semibold text-gray-800">极速响应</p><p class="text-xs text-gray-500 mt-0.5">上传即审，3-5 分钟输出完整审查报告</p></div>
          </div>
        </div>
        <div class="bg-white/80 rounded-lg border border-gray-100 p-4">
          <div class="flex gap-3">
            <div class="w-9 h-9 rounded-lg flex items-center justify-center shrink-0" style="background:#1677ff15;color:#1677ff"><i class="fa-solid fa-handshake"></i></div>
            <div><p class="text-sm font-semibold text-gray-800">专业合规</p><p class="text-xs text-gray-500 mt-0.5">覆盖 12 类合同、100+ 审查规则，持续更新</p></div>
          </div>
        </div>
        <div class="bg-white/80 rounded-lg border border-gray-100 p-4">
          <div class="flex gap-3">
            <div class="w-9 h-9 rounded-lg flex items-center justify-center shrink-0" style="background:#1677ff15;color:#1677ff"><i class="fa-solid fa-file-export"></i></div>
            <div><p class="text-sm font-semibold text-gray-800">报告导出</p><p class="text-xs text-gray-500 mt-0.5">支持 Word 格式审查报告导出与归档</p></div>
          </div>
        </div>
      </div>

      <hr class="my-8 border-gray-200">
      <p class="text-xs text-gray-400 text-center">© 2026 AI Contract Review System. All rights reserved.</p>
    </div>
  </div>

  <!-- Right: Login Form -->
  <div class="w-[400px] min-h-screen flex items-center justify-center p-12 bg-white shadow[-4px_0_24px_rgba(0,0,0,0.06)]">
    <div class="w-full">
      <h2 class="text-2xl font-bold text-gray-900">登录</h2>
      <p class="text-sm text-gray-500 mt-1 mb-8">欢迎使用合同审查系统</p>

      <form id="loginForm" class="space-y-5" onsubmit="handleLogin(event)">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
          <div class="relative">
            <i class="fa-regular fa-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="text" id="username" placeholder="请输入用户名" required class="w-full pl-10 pr-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
          <div class="relative">
            <i class="fa-regular fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="password" id="password" placeholder="请输入密码" required class="w-full pl-10 pr-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
          </div>
        </div>
        <button type="submit" class="w-full py-2.5 bg-blue-500 text-white rounded-lg text-sm font-semibold hover:bg-blue-600 transition shadow-sm">
          登 录
        </button>
      </form>

      <p class="text-center text-xs text-gray-400 mt-6">演示账号：admin / 任意密码即可登录</p>
    </div>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('username').value;
      if (!username) return;
      localStorage.setItem('auth_user', JSON.stringify({ name: username, role: 'admin' }));
      window.location.href = 'index2.html';
    }
  </script>
</body>
</html>
