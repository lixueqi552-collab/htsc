<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>合同列表</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family: 'Microsoft YaHei', -apple-system, sans-serif; }
    .status-badge { padding: 2px 10px; border-radius: 9999px; font-size: 12px; font-weight: 500; }
    .table-hover tbody tr:hover { background: #f0f7ff; }
    .action-btn { width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; border-radius: 6px; transition: all .15s; }
    .action-btn:hover { background: #e5e7eb; }
    .stat-card { transition: all .2s; }
    .stat-card:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,.08); }
  </style>
</head>
<body class="bg-gray-50 p-6">
  <!-- Stats Cards -->
  <div class="grid grid-cols-4 gap-4 mb-6">
    <div class="stat-card bg-white rounded-lg border border-gray-200 p-4 flex items-center gap-4">
      <div class="w-10 h-10 rounded-lg bg-blue-50 text-blue-500 flex items-center justify-center text-lg">
        <i class="fa-solid fa-file-lines"></i>
      </div>
      <div>
        <p class="text-2xl font-bold text-gray-800">128</p>
        <p class="text-xs text-gray-500">合同总数</p>
      </div>
    </div>
    <div class="stat-card bg-white rounded-lg border border-gray-200 p-4 flex items-center gap-4">
      <div class="w-10 h-10 rounded-lg bg-yellow-50 text-yellow-500 flex items-center justify-center text-lg">
        <i class="fa-solid fa-clock"></i>
      </div>
      <div>
        <p class="text-2xl font-bold text-gray-800">23</p>
        <p class="text-xs text-gray-500">待审查</p>
      </div>
    </div>
    <div class="stat-card bg-white rounded-lg border border-gray-200 p-4 flex items-center gap-4">
      <div class="w-10 h-10 rounded-lg bg-green-50 text-green-500 flex items-center justify-center text-lg">
        <i class="fa-solid fa-check"></i>
      </div>
      <div>
        <p class="text-2xl font-bold text-gray-800">89</p>
        <p class="text-xs text-gray-500">已审查</p>
      </div>
    </div>
    <div class="stat-card bg-white rounded-lg border border-gray-200 p-4 flex items-center gap-4">
      <div class="w-10 h-10 rounded-lg bg-red-50 text-red-500 flex items-center justify-center text-lg">
        <i class="fa-solid fa-circle-exclamation"></i>
      </div>
      <div>
        <p class="text-2xl font-bold text-gray-800">16</p>
        <p class="text-xs text-gray-500">有风险</p>
      </div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="bg-white rounded-lg border border-gray-200 p-4 mb-6">
    <div class="flex items-center justify-between gap-4">
      <div class="flex items-center gap-3 flex-1">
        <div class="relative flex-1 max-w-md">
          <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
          <input type="text" placeholder="搜索合同名称、编号..." class="w-full pl-9 pr-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>
        <select class="border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option>全部状态</option>
          <option>待审查</option>
          <option>已审查</option>
          <option>有风险</option>
        </select>
        <select id="typeFilter" class="border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option>全部类型</option>
        </select>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="parent.location.href='contract-types.html'" class="px-3 py-2 border border-gray-300 rounded-lg text-sm text-gray-600 hover:bg-gray-50 transition flex items-center gap-1.5">
          <i class="fa-solid fa-tags"></i>管理类型
        </button>
        <button onclick="parent.location.href='upload-contract.html'" class="bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-600 transition flex items-center gap-2">
          <i class="fa-solid fa-plus"></i>上传合同
        </button>
      </div>
    </div>
  </div>

  <!-- Table -->
  <div class="bg-white rounded-lg border border-gray-200 overflow-hidden">
    <table class="w-full table-hover">
      <thead>
        <tr class="bg-gray-50 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">
          <th class="px-4 py-3 w-10"><input type="checkbox" class="rounded border-gray-300"></th>
          <th class="px-4 py-3">合同编号</th>
          <th class="px-4 py-3">合同名称</th>
          <th class="px-4 py-3">类型</th>
          <th class="px-4 py-3">甲方</th>
          <th class="px-4 py-3">乙方</th>
          <th class="px-4 py-3">金额</th>
          <th class="px-4 py-3">状态</th>
          <th class="px-4 py-3">上传时间</th>
          <th class="px-4 py-3 text-center">操作</th>
        </tr>
      </thead>
      <tbody class="text-sm text-gray-600 divide-y divide-gray-100">
        <tr data-id="1">
          <td class="px-4 py-3"><input type="checkbox" class="rounded border-gray-300"></td>
          <td class="px-4 py-3 font-mono text-xs text-blue-600">CT-2026-001</td>
          <td class="px-4 py-3 font-medium text-gray-800">设备采购框架协议</td>
          <td class="px-4 py-3"><span class="bg-blue-50 text-blue-600 text-xs px-2 py-0.5 rounded">采购合同</span></td>
          <td class="px-4 py-3">明达科技</td>
          <td class="px-4 py-3">宏远设备</td>
          <td class="px-4 py-3 font-mono">¥1,280,000</td>
          <td class="px-4 py-3">
            <div class="flex items-center gap-2">
              <div class="flex gap-0.5">
                <div class="w-4 h-1.5 rounded-sm bg-yellow-400"></div>
                <div class="w-4 h-1.5 rounded-sm bg-gray-200"></div>
                <div class="w-4 h-1.5 rounded-sm bg-gray-200"></div>
                <div class="w-4 h-1.5 rounded-sm bg-gray-200"></div>
              </div>
              <span class="text-xs text-yellow-600">待审查</span>
            </div>
          </td>
          <td class="px-4 py-3 text-xs text-gray-400">2026-05-12</td>
          <td class="px-4 py-3">
            <div class="flex items-center justify-center gap-1">
              <button class="action-btn text-blue-500" title="查看" onclick="parent.location.href='review-opinion.html'"><i class="fa-regular fa-eye text-sm"></i></button>
              <button class="action-btn text-gray-500" title="编辑"><i class="fa-regular fa-pen-to-square text-sm"></i></button>
              <button class="action-btn text-red-500" title="删除"><i class="fa-regular fa-trash-can text-sm"></i></button>
            </div>
          </td>
        </tr>
        <tr data-id="3">
          <td class="px-4 py-3"><input type="checkbox" class="rounded border-gray-300"></td>
          <td class="px-4 py-3 font-mono text-xs text-blue-600">CT-2026-003</td>
          <td class="px-4 py-3 font-medium text-gray-800">办公楼租赁协议</td>
          <td class="px-4 py-3"><span class="bg-red-50 text-red-600 text-xs px-2 py-0.5 rounded">租赁合同</span></td>
          <td class="px-4 py-3">云帆集团</td>
          <td class="px-4 py-3">鼎盛物业</td>
          <td class="px-4 py-3 font-mono">¥960,000</td>
          <td class="px-4 py-3">
            <div class="flex items-center gap-2">
              <div class="flex gap-0.5">
                <div class="w-4 h-1.5 rounded-sm bg-blue-400"></div>
                <div class="w-4 h-1.5 rounded-sm bg-blue-400"></div>
                <div class="w-4 h-1.5 rounded-sm bg-gray-200"></div>
                <div class="w-4 h-1.5 rounded-sm bg-gray-200"></div>
              </div>
              <span class="text-xs text-blue-600">审查中</span>
            </div>
          </td>
          <td class="px-4 py-3 text-xs text-gray-400">2026-05-09</td>
          <td class="px-4 py-3">
            <div class="flex items-center justify-center gap-1">
              <button class="action-btn text-blue-500" title="查看" onclick="parent.location.href='review-opinion.html'"><i class="fa-regular fa-eye text-sm"></i></button>
              <button class="action-btn text-gray-500" title="编辑"><i class="fa-regular fa-pen-to-square text-sm"></i></button>
              <button class="action-btn text-red-500" title="删除"><i class="fa-regular fa-trash-can text-sm"></i></button>
            </div>
          </td>
        </tr>
        <tr data-id="2">
          <td class="px-4 py-3"><input type="checkbox" class="rounded border-gray-300"></td>
          <td class="px-4 py-3 font-mono text-xs text-blue-600">CT-2026-002</td>
          <td class="px-4 py-3 font-medium text-gray-800">年度IT运维服务合同</td>
          <td class="px-4 py-3"><span class="bg-purple-50 text-purple-600 text-xs px-2 py-0.5 rounded">服务合同</span></td>
          <td class="px-4 py-3">云帆集团</td>
          <td class="px-4 py-3">星辰科技</td>
          <td class="px-4 py-3 font-mono">¥560,000</td>
          <td class="px-4 py-3">
            <div class="flex items-center gap-2">
              <div class="flex gap-0.5">
                <div class="w-4 h-1.5 rounded-sm bg-green-400"></div>
                <div class="w-4 h-1.5 rounded-sm bg-green-400"></div>
                <div class="w-4 h-1.5 rounded-sm bg-green-400"></div>
                <div class="w-4 h-1.5 rounded-sm bg-green-400"></div>
              </div>
              <span class="text-xs text-green-600">已审查</span>
            </div>
          </td>
          <td class="px-4 py-3 text-xs text-gray-400">2026-05-10</td>
          <td class="px-4 py-3">
            <div class="flex items-center justify-center gap-1">
              <button class="action-btn text-blue-500" title="查看" onclick="parent.location.href='review-opinion.html'"><i class="fa-regular fa-eye text-sm"></i></button>
              <button class="action-btn text-gray-500" title="编辑"><i class="fa-regular fa-pen-to-square text-sm"></i></button>
              <button class="action-btn text-red-500" title="删除"><i class="fa-regular fa-trash-can text-sm"></i></button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
    <!-- Pagination -->
    <div class="flex items-center justify-between px-4 py-3 border-t border-gray-100 bg-gray-50">
      <p class="text-xs text-gray-500">共 128 条，显示 1-5 条</p>
      <div class="flex items-center gap-1">
        <button class="px-3 py-1.5 text-xs border border-gray-300 rounded bg-white text-gray-500 hover:bg-gray-50 disabled:opacity-50" disabled><i class="fa-solid fa-chevron-left"></i></button>
        <button class="px-3 py-1.5 text-xs border border-blue-500 rounded bg-blue-50 text-blue-600 font-medium">1</button>
        <button class="px-3 py-1.5 text-xs border border-gray-300 rounded bg-white text-gray-600 hover:bg-gray-50">2</button>
        <button class="px-3 py-1.5 text-xs border border-gray-300 rounded bg-white text-gray-600 hover:bg-gray-50">3</button>
        <span class="px-2 text-xs text-gray-400">...</span>
        <button class="px-3 py-1.5 text-xs border border-gray-300 rounded bg-white text-gray-600 hover:bg-gray-50">26</button>
        <button class="px-3 py-1.5 text-xs border border-gray-300 rounded bg-white text-gray-500 hover:bg-gray-50"><i class="fa-solid fa-chevron-right"></i></button>
      </div>
    </div>
  </div>

  <script>
    // Sync types from contract-types page
    const defaultTypes = ['采购合同', '销售合同', '服务合同', '租赁合同', '保密协议', '其他'];
    const filter = document.getElementById('typeFilter');
    function loadTypes() {
      let types;
      try { types = JSON.parse(localStorage.getItem('contractTypes') || 'null'); } catch { types = null; }
      if (!types) types = defaultTypes;
      filter.innerHTML = '<option>全部类型</option>' + types.map(t => `<option>${t}</option>`).join('');
    }
    loadTypes();
  </script>
</body>
</html>
